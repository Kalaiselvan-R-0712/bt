<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Stackly</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#f5f9ff;
color:#0f172a;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
display:flex;
align-items:center;
padding:0 40px;
background:white;
box-shadow:0 4px 20px rgba(0,0,0,.05);
z-index:1000;
}

.logo img{
height:42px;
}

/* DASHBOARD LAYOUT */

.dashboard{
display:flex;
margin-top:80px;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:white;
border-right:1px solid #e2e8f0;
height:calc(100vh - 80px);
padding:30px 20px;
position:fixed;
top:80px;
left:0;
}

.sidebar h3{
font-size:14px;
margin-bottom:20px;
color:#64748b;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:12px 12px;
border-radius:8px;
text-decoration:none;
color:#334155;
margin-bottom:6px;
font-size:14px;
}

.sidebar a:hover{
background:#eaf3ff;
color:#3ea6ff;
}

.sidebar a.active{
background:#eaf3ff;
color:#3ea6ff;
}

/* MAIN CONTENT */

.main{
margin-left:240px;
padding:40px;
width:100%;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.search{
background:white;
border-radius:30px;
padding:10px 18px;
display:flex;
align-items:center;
gap:10px;
width:420px;
border:1px solid #e2e8f0;
}

.search input{
border:none;
outline:none;
width:100%;
}

.user{
display:flex;
align-items:center;
gap:16px;
}

.bell{
position:relative;
font-size:18px;
cursor:pointer;
}

.bell span{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:20px;
}

.profile{
display:flex;
align-items:center;
gap:8px;
}

/* WELCOME */

.welcome{
margin-bottom:30px;
}

.welcome h1{
font-size:28px;
margin-bottom:6px;
}

.welcome p{
color:#64748b;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:24px;
border-radius:14px;
border:1px solid #e2e8f0;
}

.card i{
font-size:24px;
margin-bottom:12px;
color:#3ea6ff;
}

.card h2{
font-size:26px;
margin:6px 0;
}

.card a{
text-decoration:none;
color:#3ea6ff;
font-size:14px;
}

/* RESULTS */

.results{
background:white;
border-radius:16px;
padding:25px;
margin-bottom:30px;
border:1px solid #e2e8f0;
}

.test{
background:#f8fbff;
border-radius:10px;
padding:18px;
margin-top:16px;
border-left:4px solid #3ea6ff;
}

.test h3{
margin-bottom:6px;
}

.test p{
color:#64748b;
font-size:14px;
margin-bottom:12px;
}

.test button{
background:#0f172a;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

.status{
position:absolute;
right:20px;
top:18px;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.completed{
background:#16a34a;
color:white;
}

.test{
position:relative;
}

/* GRID SECTIONS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.panel{
background:white;
border-radius:14px;
padding:20px;
border:1px solid #e2e8f0;
}

.panel h3{
margin-bottom:16px;
}

/* APPOINTMENT */

.appointment{
background:#f8fbff;
padding:14px;
border-radius:10px;
}

/* BILLING */

.bill{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

/* AI BOX */

.ai{
background:linear-gradient(135deg,#6b21a8,#2563eb);
color:white;
padding:30px;
border-radius:16px;
}

.ai-item{
background:rgba(255,255,255,0.1);
padding:14px;
border-radius:10px;
margin-top:10px;
}

/* RESPONSIVE */

@media(max-width:1000px){

.cards{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.sidebar{
width:70px;
}

.sidebar a span{
display:none;
}

.main{
margin-left:70px;
padding:25px;
}

.search{
width:220px;
}

}

}

/* HEADER ACTIONS */

.header-actions{

}

}

/* PROFILE */.profile{

}

/* PROFILE TEXT */

.profile-info{
display:flex;

line-height:1.2;
}

.profile-name{
font-weight:600;
font-size:14px;
}

.profile-email{

}

.profile{
display:flex;
align-items:center;
gap:8px;

}

.logout{
margin-top:20px;
color:#ef4444;
}

.logout:hover{
background:#fee2e2;
color:#dc2626;
}

.quick-stats{
background:#eef2ff;
padding:20px;
border-radius:12px;
margin-top:30px;
}

.quick-stats h4{
margin-bottom:12px;
color:#334155;
}

.stat{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
}

.test button{
background:#0f172a;
color:white;
border:none;
outline:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
display:inline-block;
}

.bell{
position:relative;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

.bell:hover{
transform:scale(1.08);
}

/* ===== LARGE DESKTOP ===== */
@media (min-width:1400px){

.main{
padding:50px;
}

.cards{
grid-template-columns:repeat(3,1fr);
}

}

/* ===== LAPTOP ===== */
@media (max-width:1200px){

.header-search{
width:320px;
}

.cards{
grid-template-columns:repeat(2,1fr);
}

.grid{
grid-template-columns:1fr;
}

}

/* ===== SMALL LAPTOP / PALMTOP ===== */
@media (max-width:992px){

.sidebar{
width:200px;
}

.main{
margin-left:200px;
padding:30px;
}

.header-search{
width:260px;
}

.cards{
grid-template-columns:1fr;
}

}

@media (max-width:992px){

.sidebar{
width:70px;
padding:20px 10px;
}

.sidebar h3{
display:none;
}

.sidebar a{
justify-content:center;
}

.sidebar a span{
display:none;
}

.main{
margin-left:70px;
}

}

/* ===== TABLET ===== */
@media (max-width:768px){

}

.main{

}

.header-search{

}

.profile-email{

}

}

.results,
.panel,
.ai{
width:100%;
}

.menu-toggle{

border:none;

padding:6px;
}

/* ===== MOBILE SIDEBAR ===== */

}

}

}

}

</head>

<body>
<div class="overlay" id="overlay"></div>

<header class="dash-header">

<div class="header-left">
<button class="menu-toggle" id="menuToggle">
<i class="fa-solid fa-bars"></i>
</button>

<div class="logo">
<img src="assets/images/logo/stackly_logo.webp">
</div>
</div>

<div class="header-search">
<i class="fa-solid fa-search"></i>
<input id="headerSearch" type="text" placeholder="Search samples, projects, patients...">
</div>

<div class="header-actions">

<div class="bell" onclick="location.href='ad_404.html'">
<i class="fa-regular fa-bell"></i>
<span>3</span>
</div>

<div class="profile">
<i class="fa-regular fa-user"></i>
<div class="profile-info">
<span class="profile-name" id="profileName"></span>
<span class="profile-email" id="profileEmail"></span>
</div>
</div>

</div>

</header>

<div class="dashboard">

<aside class="sidebar">

<h3>Admin Portal</h3>

<a href="admin_dash.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
<a href="ap_dash.html"><i class="fa-solid fa-flask"></i><span>Research Projects</span></a>
<a href="aq_dash.html"><i class="fa-solid fa-dna"></i><span>Genetic Sequencing</span></a>
<a href="aa_dash.html"><i class="fa-solid fa-file-lines"></i><span>AI Analysis</span></a>
<a href="abl_dash.html"><i class="fa-solid fa-credit-card"></i><span>Billing</span></a>
<a href="ast_dash.html" class="active"><i class="fa-solid fa-gear"></i><span>Settings</span></a>

<a href="#" onclick="logoutUser()" class="logout">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</a>

</aside>


<main class="main">

<div class="welcome">
<h1>Account Settings</h1>
<p>Manage your profile, security and notification preferences</p>
</div>


<!-- PROFILE SETTINGS -->

<div class="panel">

<h3>Profile Information</h3>

<div class="grid">

<div>
<label>Full Name</label>
<input type="text" value="Admin" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

<div>
<label>Email Address</label>
<input type="email" id="settingsEmail" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

<div>
<label>Phone Number</label>
<input type="text" placeholder="+1 555 555 5555" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

<div>
<label>Date of Birth</label>
<input type="date" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

</div>

<button onclick="location.href='ad_404.html'" style="
margin-top:20px;
background:#0f172a;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
">
Save Changes
</button>

</div>



<!-- SECURITY -->

<div class="panel">

<h3>Security</h3>

<div class="grid">

<div>
<label>Current Password</label>
<input type="password" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

<div>
<label>New Password</label>
<input type="password" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

<div>
<label>Confirm Password</label>
<input type="password" style="width:100%;padding:10px;margin-top:6px;border:1px solid #e2e8f0;border-radius:8px;">
</div>

</div>

<button onclick="location.href='ad_404.html'" style="
margin-top:20px;
background:#0f172a;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
">
Update Password
</button>

</div>



<!-- NOTIFICATIONS -->

<div class="panel">

<h3>Notification Preferences</h3>

<div style="margin-top:10px">

<label style="display:flex;gap:10px;margin-bottom:10px;">
<input type="checkbox" checked>
Email notifications for test results
</label>

<label style="display:flex;gap:10px;margin-bottom:10px;">
<input type="checkbox" checked>
Appointment reminders
</label>

<label style="display:flex;gap:10px;margin-bottom:10px;">
<input type="checkbox">
Clinical trial updates
</label>

<label style="display:flex;gap:10px;margin-bottom:10px;">
<input type="checkbox">
Marketing emails
</label>

</div>

<button onclick="location.href='ad_404.html'" style="
margin-top:20px;
background:#0f172a;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
">
Save Preferences
</button>

</div>



<!-- ACCOUNT ACTIONS -->

<div class="panel">

<h3>Account Actions</h3>

<p style="color:#64748b;margin-bottom:20px;">
Manage your account security and data
</p>

<div style="display:flex;gap:12px;flex-wrap:wrap">

<button onclick="location.href='ad_404.html'" style="
background:#e2e8f0;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
">
Download My Data
</button>

<button onclick="location.href='ad_404.html'" style="
background:#fee2e2;
color:#dc2626;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
">
Delete Account
</button>

</div>

</div>

</main>

</div>

<script>

const searchInput = document.getElementById("headerSearch");

searchInput.addEventListener("keypress", function(e){

if(e.key === "Enter"){

const value = searchInput.value.trim();

if(value !== ""){
window.location.href = "ad_404.html";
}

}

});

</script>

<script>

const menuToggle = document.getElementById("menuToggle");
const sidebar = document.querySelector(".sidebar");
const overlay = document.getElementById("overlay");

menuToggle.addEventListener("click", () => {
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
sidebar.classList.remove("active");
overlay.classList.remove("active");
});

</script>

<script>

// ===== SESSION CHECK =====
const email = localStorage.getItem("userEmail");
const role = localStorage.getItem("userRole");

// BLOCK DIRECT ACCESS
if(!email || !role){
window.location.href = "login.html";
}

// ADMIN ONLY ACCESS
if(role !== "Administrator"){
window.location.href = "login.html";
}

// SET HEADER DATA
document.getElementById("profileEmail").textContent = email;
document.getElementById("profileName").textContent = role;

// 👉 ADD THIS LINE (IMPORTANT)
document.getElementById("settingsEmail").value = email;

// LOGOUT
function logoutUser(){
localStorage.clear();
window.location.href = "login.html";
}

</script>

</body>
</html>
